name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/add-superpower-kit-fIfQI]
    paths:
      - 'src/**'
      - 'public/**'
      - 'data/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GH_PAT: ${{ secrets.GH_PAT }}
        run: npm run build

      # 複製加密資料到 dist/ 讓前端能讀取
      - name: Copy encrypted data to dist
        run: |
          mkdir -p dist/data
          if [ -f data/latest.json.enc ]; then
            cp data/latest.json.enc dist/data/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
