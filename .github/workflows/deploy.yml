name: Deploy to Cloudflare Pages

on:
  push:
    branches: [claude/add-superpower-kit-fIfQI]
    paths:
      - 'src/**'
      - 'public/**'
      - 'data/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SYNC_ENCRYPTION_KEY: ${{ secrets.SYNC_ENCRYPTION_KEY }}
          VITE_GH_PAT: ${{ secrets.GH_PAT }}
        run: npm run build

      # 複製加密資料到 dist/ 讓前端能讀取
      - name: Copy encrypted data to dist
        run: |
          mkdir -p dist/data
          if [ -f data/latest.json.enc ]; then
            cp data/latest.json.enc dist/data/
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=bank-sync
