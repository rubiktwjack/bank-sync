name: Update Stock Prices

on:
  workflow_dispatch:
    inputs:
      new_tickers:
        description: '要新增到 watchlist 的 ticker（逗號分隔）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Add new tickers to watchlist
        if: inputs.new_tickers != ''
        run: |
          node -e "
            const fs = require('fs');
            const path = 'data/stock-watchlist.json';
            const list = JSON.parse(fs.readFileSync(path, 'utf-8'));
            const newTickers = '${{ inputs.new_tickers }}'.split(',').map(t => t.trim().toUpperCase()).filter(t => t && !list.includes(t));
            if (newTickers.length > 0) {
              list.push(...newTickers);
              fs.writeFileSync(path, JSON.stringify(list, null, 2) + '\n');
              console.log('Added:', newTickers.join(', '));
            } else {
              console.log('No new tickers to add');
            }
          "

      - name: Install scraper dependencies
        working-directory: scrapers
        run: npm ci

      - name: Fetch stock prices
        working-directory: scrapers
        run: npm run fetch-stocks

      - name: Commit
        run: |
          git config user.name "bank-sync-bot"
          git config user.email "bot@bank-sync"
          git add data/stock-watchlist.json data/stock-prices.json
          git diff --staged --quiet || git commit -m "stocks: update prices"
          git push

  deploy:
    needs: update
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
